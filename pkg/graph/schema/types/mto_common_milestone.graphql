"""
MTOCommonMilestone represents a Milestone from the "Common Milestones" library
"""
type MTOCommonMilestone {
  # DB Fields
  id: UUID!
  name: String!
  description: String!
  categoryName: String!
  subCategoryName: String
  facilitatedByRole: [MTOFacilitator!]!
  """
  Specifies the Task List Section that corresponds to suggesting this common milestone
  """
  section: TaskListSection

  # Custom Resolvers
  """
  To represent if this Common Milestone is _already_ part of the Model Plan's MTO.
  This will automatically return false if it is not in the context of a model plan (eg fetched by key instead of model plan id)
  """
  isAdded: Boolean!
  """
  Returns the suggestion context for this milestone in relation to a model plan.
  If modelPlanID is provided, it takes precedence over any model plan context from how the milestone was fetched.
  Returns isSuggested: false with empty reasons when no model plan context is available.
  """
  suggested(modelPlanID: UUID): MilestoneSuggestionReasons!
  isArchived: Boolean!
  commonSolutions: [MTOCommonSolution!]!
}

input MtoCommonMilestoneChanges @goModel(model: "map[string]interface{}") {
  name: String
  description: String
  categoryName: String
  subCategoryName: String
  facilitatedByRole: [MTOFacilitator!]
  mtoCommonSolutionKeys: [MTOCommonSolutionKey!]
}

extend type Query {
  """
  Fetch all Common Milestones available in the library
  """
  mtoCommonMilestones: [MTOCommonMilestone!]!
    @hasAnyRole(roles: [MINT_USER, MINT_MAC])
}

extend type Mutation {
  createMtoCommonMilestone(
    name: String!
    description: String!
    categoryName: String!
    subCategoryName: String!
    facilitatedByRole: [MTOFacilitator!]!
    mtoCommonSolutionKeys: [MTOCommonSolutionKey!]!
  ): MTOCommonMilestone! @hasRole(role: MINT_ASSESSMENT)

  updateMtoCommonMilestone(
    id: UUID!
    changes: MtoCommonMilestoneChanges!
  ): MTOCommonMilestone! @hasRole(role: MINT_ASSESSMENT)

  archiveMtoCommonMilestone(id: UUID!): MTOCommonMilestone!
    @hasRole(role: MINT_ASSESSMENT)
}
